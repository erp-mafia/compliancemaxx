# Skill manifest for GDPR (Reg. EU 2016/679).
# Privado for data-flow + RoPA, Semgrep custom rules, Bearer for privacy
# patterns, Helsinki for frontend consent. Agentic RoPA-drift, purpose-
# limitation, and consent-logic checks in swarm mode.

id: gdpr-cicd-compliance
version: 1.0.0
description: GDPR repo+CI/CD audit including RoPA drift, Schrems II, DSAR endpoints.

detection:
  paths:
    - "**/migrations/**"
    - "**/openapi.yaml"
    - "**/openapi.yml"
    - "**/*.graphql"
    - "**/package.json"
    - "**/requirements.txt"
    - "**/go.mod"
    - "**/auth/**"
    - "**/controllers/**"
    - ".compliance/ropa.*"
    - ".compliance/dpia*/**"
    - ".compliance/transfers/**"
    - ".compliance/**/*.md"
    - "**/Dockerfile*"

consumes: ["sbom"]

static_scan:
  - id: privado-scan
    tool: docker
    image: public.ecr.aws/privado/privado:latest
    args: ["scan", "--rules", "/app/rules", "${REPO}"]
    parser: privado
    timeout_seconds: 600
    pr_mode_enabled: false       # Privado is heavy; swarm-only
    swarm_mode_enabled: true
    failure_action: warn

  - id: semgrep-gdpr
    tool: docker
    image: returntocorp/semgrep:latest
    args:
      - "semgrep"
      - "scan"
      - "--config"
      - "${REPO}/.semgrep/gdpr/"
      - "--json"
      - "--output=${OUT}"
      - "--quiet"
      - "${REPO}"
    parser: semgrep
    timeout_seconds: 180
    pr_mode_enabled: true
    failure_action: warn          # only when .semgrep/gdpr/ exists

  - id: bearer
    tool: docker
    image: bearer/bearer:latest
    args:
      - "scan"
      - "${REPO}"
      - "--report"
      - "summary"
      - "--format"
      - "json"
      - "--output"
      - "${OUT}"
    parser: bearer
    timeout_seconds: 240
    pr_mode_enabled: true
    failure_action: warn

  # Helsinki GDPR Scanner (consent banner / pre-consent script detection)
  # has no public Docker image. To enable, build it locally and override
  # `image:` here, OR run it as a separate CI step against a deployed URL.
  # Disabled by default so swarm-mode runs cleanly.
  - id: helsinki-frontend
    tool: docker
    image: stonehenge/gdpr-scanner:latest
    args: ["--url", "${COMPLIANCE_TARGET_URL}", "--format", "json", "--output", "${OUT}"]
    parser: helsinki
    timeout_seconds: 300
    pr_mode_enabled: false
    swarm_mode_enabled: false
    failure_action: warn

deep_audit:
  - id: ropa-drift
    prompt_file: references/agentic-prompts.md
    section: "RoPA drift detection"
    inputs:
      - changed_files
      - sbom
      - ".compliance/ropa.*"
      - "**/migrations/**"
      - "**/*.sql"

  - id: purpose-limitation
    prompt_file: references/agentic-prompts.md
    section: "Purpose limitation"
    inputs:
      - changed_files
      - "**/api/**"
      - "**/controllers/**"
      - ".compliance/ropa.*"

  - id: consent-vs-cookie-policy
    prompt_file: references/agentic-prompts.md
    section: "Consent logic vs. cookie policy"
    inputs:
      - changed_files
      - ".compliance/consent_mappings.yaml"
      - ".compliance/cookie_policy.md"

  - id: schrems-ii-transfers
    prompt_file: references/transfers-schrems-ii.md
    inputs:
      - sbom
      - ".compliance/transfers/**"
      - ".compliance/dpia*/**"

finding_extraction:
  framework: gdpr
  default_severity_mapping:
    critical: critical
    high: high
    medium: medium
    low: low
    warning: medium
  cross_framework:
    - { tag: "NIST 800-53", control: "PT-2" }
    - { tag: "NIST 800-53", control: "SI-12" }
    - { tag: "ISO 27001:2022", control: "A.5.34" }
    - { tag: "ISO 27001:2022", control: "A.8.24" }
    - { tag: "SOC 2", control: "P1.1" }
    - { tag: "CIS v8", control: "3" }

suppression:
  config_file: null
  inline_pragma: "gdpr-suppress:"

out_of_repo:
  - "Article 22 meaningful human involvement adjudication"
  - "Article 9(2)(g) substantial public interest proportionality"
  - "DPA / SCC contracts (legal documents, not repo content)"
  - "Regulator notifications (Article 33/34 actual filings)"
  - "Employee training completion"
  - "Physical security"
