# Skill manifest for OWASP ASVS v5.0.0 application-security verification.
# PR-mode: Semgrep CE + Trivy + GitLeaks. Swarm-mode adds CodeQL (where
# build available) and agentic V2/V6/V7/V8/V14/V16 reasoning over Documented
# Security Decisions.

id: owasp-asvs-v5-compliance
version: 1.0.0
description: OWASP ASVS v5 verification across V1-V17 chapters at L1/L2/L3.

detection:
  always_applicable: true       # any web/API surface — most repos
  paths:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rs"
    - "**/*.java"
    - "**/*.rb"
    - "**/*auth*"
    - "**/*session*"
    - "**/*token*"
    - "**/*crypto*"
    - "**/controllers/**"
    - "**/middleware/**"
    - "**/api/**"
    - "docs/security/**"
    - ".compliance/**"

consumes: ["sbom"]

static_scan:
  - id: semgrep-asvs
    tool: docker
    image: returntocorp/semgrep:latest
    args:
      - "semgrep"
      - "scan"
      - "--config=p/owasp-top-ten"
      - "--config=p/security-audit"
      - "--json"
      - "--output=${OUT}"
      - "--quiet"
      - "${REPO}"
    parser: semgrep
    timeout_seconds: 240
    pr_mode_enabled: true

  - id: gitleaks
    tool: docker
    image: zricethezav/gitleaks:latest
    args: ["detect", "--source", "${REPO}", "--report-format", "json", "--report-path", "${OUT}", "--no-git"]
    parser: gitleaks
    timeout_seconds: 120
    pr_mode_enabled: true

  - id: trivy-fs
    tool: docker
    image: aquasec/trivy:latest
    args:
      - "fs"
      - "--format"
      - "json"
      - "--output"
      - "${OUT}"
      - "--scanners"
      - "vuln,secret,misconfig"
      - "--severity"
      - "HIGH,CRITICAL"
      - "${REPO}"
    parser: trivy
    timeout_seconds: 240
    pr_mode_enabled: true

  # CodeQL is not distributed as a public Docker image. To use it,
  # consumers should add github/codeql-action steps to their CI directly.
  # Disabled here so swarm-mode runs cleanly out-of-the-box.
  - id: codeql
    tool: docker
    image: ghcr.io/github/codeql-action/codeql-cli:latest
    args: ["database", "analyze", "--format=sarif-latest", "--output=${OUT}", "${ARTIFACT_DIR}/codeql-db"]
    parser: sarif
    timeout_seconds: 1200
    pr_mode_enabled: false
    swarm_mode_enabled: false
    failure_action: warn

deep_audit:
  - id: v8-broken-access-control
    prompt_file: references/identity-chapters.md
    section: "V8"
    inputs:
      - changed_files
      - "docs/security/authorization-policy.md"
      - "**/controllers/**"
      - "**/middleware/**"

  - id: v2-validation-business-logic
    prompt_file: references/foundational-chapters.md
    section: "V2"
    inputs:
      - changed_files
      - "docs/security/authentication-policy.md"
      - "**/api/**"

  - id: v6-authentication
    prompt_file: references/identity-chapters.md
    section: "V6"
    inputs:
      - changed_files
      - "docs/security/authentication-policy.md"
      - "**/auth/**"
      - "**/middleware/**"

  - id: v14-data-protection
    prompt_file: references/platform-chapters.md
    section: "V14"
    inputs:
      - changed_files
      - sbom
      - "docs/security/data-classification.md"
      - "**/api/**"

  - id: v16-logging
    prompt_file: references/platform-chapters.md
    section: "V16"
    inputs:
      - changed_files
      - "docs/security/data-classification.md"

finding_extraction:
  framework: asvs
  default_severity_mapping:
    ERROR: high
    WARNING: medium
    INFO: low
  cross_framework:
    - { tag: "NIST 800-53", control: "SA-15" }
    - { tag: "ISO 27001:2022", control: "A.8.25" }
    - { tag: "ISO 27001:2022", control: "A.8.28" }
    - { tag: "SOC 2", control: "CC4.1" }
    - { tag: "SOC 2", control: "CC8.1" }
    - { tag: "CIS v8", control: "16" }

suppression:
  config_file: null
  inline_pragma: null

out_of_repo:
  - "WAF runtime rules (CSP, HSTS, cookie enforcement at the edge)"
  - "DDoS posture / network controls"
  - "NIST 800-63A identity proofing, biometric enrollment"
  - "Incident response execution / tabletop exercises"
  - "Runtime parity between staging and production"
