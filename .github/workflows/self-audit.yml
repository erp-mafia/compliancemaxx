name: Self-audit (dogfood)

# Runs the orchestrator against its own repo nightly. If the tool can't survive
# its own audit, it shouldn't be auditing other people's repos.

on:
  schedule:
    - cron: '0 4 * * *'      # 04:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  id-token: write

jobs:
  self-audit:
    name: Audit ourselves
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          mode: swarm
          # Self-audit runs without LLM by default — provider creds are gated
          # behind the COMPLIANCE_BEDROCK_ROLE_ARN repo variable.
          no-llm: ${{ vars.COMPLIANCE_BEDROCK_ROLE_ARN == '' }}
          fail-on-findings: false       # self-audit is observational, not blocking

      - name: Configure AWS for LLM (when role available)
        if: vars.COMPLIANCE_BEDROCK_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.COMPLIANCE_BEDROCK_ROLE_ARN }}
          aws-region: ${{ vars.COMPLIANCE_AWS_REGION || 'eu-north-1' }}
