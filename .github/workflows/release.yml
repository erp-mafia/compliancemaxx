name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write       # for npm publish provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release via changesets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # Intentionally NO `registry-url` — that would write an .npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}` which collides with npm's OIDC
          # trusted-publisher flow and causes a silent 404 on publish.

      - name: Upgrade npm to ≥11.5.1 (required for trusted-publisher OIDC)
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npx changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — npm Trusted Publisher (configured at
          # https://www.npmjs.com/package/compliancemaxx/access) mints a
          # short-lived OIDC token at publish time. Provenance
          # attestations are produced automatically because publishConfig
          # in packages/cli/package.json sets `provenance: true`.
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Move major-version Action tag (v1, v2, ...)
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull the package version from packages/cli/package.json after changesets bumped it.
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          MAJOR="v$(echo "$VERSION" | cut -d. -f1)"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -fa "$MAJOR" -m "compliancemaxx $MAJOR (-> $VERSION)"
          git push origin "$MAJOR" --force
